<!DOCTYPE html>
<html>

<head>
<title>Medical Cost Predictor</title>
</head>

<body>

<h2>Medical Insurance Cost Predictor</h2>
<p>Enter the details below to estimate the medical insurance cost.</p><form action="/predict" method="post">

Age: <input type="number" name="age"><br><br>

Sex:
<select name="sex">
<option value="0">Female</option>
<option value="1">Male</option>
</select><br><br>

BMI: <input type="number" step="0.1" name="bmi"><br><br>

Children: <input type="number" name="children"><br><br>

Smoker:
<select name="smoker">
<option value="0">No</option>
<option value="1">Yes</option>
</select><br><br>

Region:
<select name="region">
<option value="0">Southwest</option>
<option value="1">Southeast</option>
<option value="2">Northwest</option>
<option value="3">Northeast</option>
</select><br><br>

<button type="submit">Predict Cost</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>

</html>
